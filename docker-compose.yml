services:
  postgres:
    image: postgres:16-alpine
    container_name: llm_project_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikidb}
      POSTGRES_USER: ${POSTGRES_USER:-wikiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikipass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  app:
    build: .
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wikidb}
      POSTGRES_USER: ${POSTGRES_USER:-wikiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikipass}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      MIN_TEXT_LENGTH: ${MIN_TEXT_LENGTH:-200}
      WIKI_JSON_GLOB: ${WIKI_JSON_GLOB:-**/*}
      WIKI_EXTRACTED_DIR: ${WIKI_EXTRACTED_DIR:-data/extracted}
    volumes:
      - .:/app
      - ./data:/app/data
    profiles:
      - app

volumes:
  postgres_data:
